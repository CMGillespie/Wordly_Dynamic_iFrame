<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dynamic Configurator v1.3.0</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --text: #c9d1d9;
            --apac-bg: #0d2a1d; /* Subtle dark green for APAC mode */
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; transition: background 0.4s; }
        .container { max-width: 1100px; margin: 0 auto; }
        .setup-card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: #fff; }
        .input-group { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #30363d; margin-left: 10px; }
        .iframe-wrap { width: 100%; height: 600px; background: #000; border-radius: 8px; border: 4px solid #30363d; overflow: hidden; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .code-reveal-area { margin-top: 40px; display: none; background: #0d1117; padding: 25px; border-radius: 8px; border: 1px dashed var(--accent); }
        pre { white-space: pre-wrap; color: #79c0ff; font-size: 14px; line-height: 1.5; }
        button#reveal-btn { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1>Wordly Live Configurator</h1>
        <div class="input-group">
            <div class="field">
                <label>Session ID (ABCD-1234)</label>
                <input type="text" id="session-id" placeholder="XXXX-0000" maxlength="9">
            </div>
            <div class="field">
                <label>Select Language</label>
                <select id="lang-picker"><option>Loading languages...</option></select>
            </div>
            <div id="mode-status" class="badge">NORMAL MODE</div>
        </div>
        <div class="iframe-wrap">
            <iframe id="display-frame" allow="microphone"></iframe>
        </div>
        <button id="reveal-btn" onclick="toggleCode()">Click Here to See Implementation Code</button>
    </div>

    <div id="code-reveal" class="code-reveal-area">
        <h2>Implementation Guide</h2>
        <p>This block shows the specific logic required to handle the <strong>finalOnly</strong> toggle for APAC languages.</p>
        <pre id="code-output"></pre>
    </div>
</div>

<script>
/* VERSION: 1.3.0
   COMPLIANCE: WCAG 2.1 AA
*/

const APAC_LIST = ['zh', 'ja', 'ko']; // Hardcoded triggers for 'finalOnly'
const sessionIdInput = document.getElementById('session-id');
const langPicker = document.getElementById('lang-picker');
const frame = document.getElementById('display-frame');
const modeStatus = document.getElementById('mode-status');

// 1. Fetch live languages from Wordly
async function loadLanguages() {
    try {
        const response = await fetch('https://assets.wordly.ai/language-config/languages.json');
        const data = await response.json();
        langPicker.innerHTML = ''; // Clear loading
        data.forEach(lang => {
            let opt = document.createElement('option');
            opt.value = lang.code;
            opt.innerText = lang.name;
            langPicker.appendChild(opt);
        });
    } catch (e) {
        langPicker.innerHTML = '<option value="en">English (Backup)</option>';
    }
}

// 2. Session ID Input Mask (Forces ABCD-1234)
sessionIdInput.addEventListener('input', (e) => {
    let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (value.length > 4) {
        value = value.slice(0, 4) + '-' + value.slice(4, 8);
    }
    e.target.value = value;
    updatePreview();
});

// 3. The Core Logic Engine
function updatePreview() {
    const sid = sessionIdInput.value || "YOUR-ID";
    const lang = langPicker.value;
    const isApac = APAC_LIST.includes(lang);

    // Visual feedback
    if(isApac) {
        document.body.style.backgroundColor = "var(--apac-bg)";
        modeStatus.innerText = "APAC MODE: FINAL ONLY ACTIVE";
        modeStatus.style.background = "#238636";
    } else {
        document.body.style.backgroundColor = "var(--bg)";
        modeStatus.innerText = "NORMAL MODE";
        modeStatus.style.background = "#30363d";
    }

    // Refresh Iframe
    const finalUrl = `https://wordly.ai/stream/${sid}?language=${lang}&finalOnly=${isApac}`;
    frame.src = finalUrl;

    generateCodeSummary(sid, lang, isApac, finalUrl);
}

function generateCodeSummary(sid, lang, isApac, url) {
    const codeText = `
// --- STEP 1: DEFINE THE RULES ---
const APAC_LANGS = ['zh', 'ja', 'ko']; 

// --- STEP 2: DYNAMICALLY BUILD THE URL ---
// Selected Language: ${lang}
// finalOnly Flag: ${isApac} (Triggered because it is ${isApac ? '' : 'NOT '}in APAC list)

const targetUrl = "${url}";

// --- STEP 3: UPDATE THE IFRAME ---
document.getElementById('wordly-frame').src = targetUrl;

/* EXPLAINER (ELI16):
   - We detect if the user chose a language that requires 'Full Sentences' (APAC).
   - We then "stitch" the Wordly address with the specific setting (?finalOnly=${isApac}).
   - This allows the same iframe to behave differently based on the language choice.
*/`;
    document.getElementById('code-output').innerText = codeText;
}

function toggleCode() {
    const area = document.getElementById('code-reveal');
    area.style.display = area.style.display === 'block' ? 'none' : 'block';
}

langPicker.addEventListener('change', updatePreview);
loadLanguages();
</script>
</body>
</html>
