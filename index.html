<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dynamic Iframe Demo</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --text: #c9d1d9;
            --apac-bg: #0d2a1d; 
            --highlight: #f0ad4e;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.4s; }
        .container { max-width: 1000px; margin: 0 auto; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        .url-monitor { 
            background: #000; 
            border: 1px solid var(--highlight); 
            padding: 12px; 
            border-radius: 6px; 
            margin: 15px 0; 
            font-family: monospace; 
            font-size: 13px;
            color: var(--highlight);
            word-break: break-all;
        }

        .input-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 6px; font-size: 16px; min-width: 220px; }
        
        #frame-holder { display: none; width: 100%; height: 550px; background: #000; border-radius: 8px; border: 2px solid #30363d; overflow: hidden; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #code-reveal { display: none; background: #0d1117; padding: 25px; border-radius: 8px; border: 1px solid var(--accent); margin-top: 20px; }
        pre { white-space: pre-wrap; color: #79c0ff; font-size: 13px; line-height: 1.5; }
        button { cursor: pointer; padding: 12px 24px; border-radius: 6px; border: none; font-weight: bold; background: var(--accent); color: white; margin-top: 10px; }
        .placeholder { height: 550px; display: flex; align-items: center; justify-content: center; border: 2px dashed #30363d; border-radius: 8px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1>Wordly Dynamic Iframe Demo</h1>
        
        <div class="input-group">
            <div class="field">
                <label>1. Session ID</label>
                <input type="text" id="session-id" placeholder="ABCD-1234" maxlength="9">
            </div>
            <div class="field">
                <label>2. Select Language</label>
                <select id="lang-picker">
                    <option value="" disabled selected>-- Choose Language --</option>
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="zh">Chinese (APAC Rule)</option>
                    <option value="ja">Japanese (APAC Rule)</option>
                    <option value="ko">Korean (APAC Rule)</option>
                </select>
            </div>
        </div>

        <div class="url-monitor">
            <strong>LIVE SIGNAL PATH:</strong> <br>
            <span id="url-display">Awaiting valid inputs...</span>
        </div>

        <div id="placeholder" class="placeholder">Iframe will load after configuration</div>
        <div id="frame-holder">
            <iframe id="display-frame" allow="microphone; clipboard-write"></iframe>
        </div>

        <button onclick="toggleCode()">Click Here to See Implementation Code</button>
    </div>

    <div id="code-reveal">
        <h3>Implementation Logic (Javascript)</h3>
        <pre id="code-output"></pre>
    </div>
</div>

<script>
const APAC_LIST = ['zh', 'ja', 'ko'];
const sidInput = document.getElementById('session-id');
const langPicker = document.getElementById('lang-picker');
const frame = document.getElementById('display-frame');
const frameHolder = document.getElementById('frame-holder');
const placeholder = document.getElementById('placeholder');
const urlDisplay = document.getElementById('url-display');
const codeOutput = document.getElementById('code-output');

sidInput.addEventListener('input', (e) => {
    let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
    e.target.value = val;
    update();
});

function update() {
    const sid = sidInput.value;
    const lang = langPicker.value;
    
    if (sid.length < 9 || !lang) {
        urlDisplay.innerText = "Awaiting valid inputs...";
        frameHolder.style.display = "none";
        placeholder.style.display = "flex";
        return;
    }

    const isApac = APAC_LIST.includes(lang);
    document.body.style.backgroundColor = isApac ? "#0d2a1d" : "#0b0e14";
    placeholder.style.display = "none";
    frameHolder.style.display = "block";

    // UPDATED: lang, finalOnly, AND speakerLanguage flags
    const finalUrl = `https://attend.wordly.ai/frame/${sid}?lang=${lang}&finalOnly=${isApac}&speakerLanguage=false`;
    
    urlDisplay.innerText = finalUrl;
    frame.src = finalUrl;

    codeOutput.innerText = `
// REFRESH LOGIC
const apacLangs = ['zh', 'ja', 'ko'];
const selectedLang = "${lang}";
const isFinalOnly = apacLangs.includes(selectedLang);

// Generate formatted frame URL
// Parameters:
// lang=${lang} (Sets language & hides internal selector)
// finalOnly=\${isFinalOnly} (Triggers complete sentences for APAC)
// speakerLanguage=false (Hides the secondary language selector)

const iframeSource = "https://attend.wordly.ai/frame/${sid}?lang=" + selectedLang + 
                     "&finalOnly=" + isFinalOnly + 
                     "&speakerLanguage=false";

document.getElementById('wordly-frame').src = iframeSource;`;
}

function toggleCode() {
    const el = document.getElementById('code-reveal');
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    if(el.style.display === 'block') el.scrollIntoView({ behavior: 'smooth' });
}

langPicker.addEventListener('change', update);

fetch('https://assets.wordly.ai/language-config/languages.json')
    .then(r => r.json())
    .then(data => {
        langPicker.innerHTML = '<option value="" disabled selected>-- Choose Language --</option>';
        data.forEach(l => {
            let o = document.createElement('option');
            o.value = l.code;
            o.innerText = l.name + (APAC_LIST.includes(l.code) ? ' (APAC Rule)' : '');
            langPicker.appendChild(o);
        });
    }).catch(e => console.warn("Using internal backup language list."));

</script>
</body>
</html>
