<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dynamic Iframe Demo</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #2f81f7;
            --text: #c9d1d9;
            --apac-bg: #0d2a1d; 
            --highlight: #f0ad4e;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.4s; }
        .container { max-width: 1000px; margin: 0 auto; }
        .setup-card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        /* Signal Path Box */
        .url-monitor { 
            background: #000; 
            border: 1px solid var(--highlight); 
            padding: 10px; 
            border-radius: 6px; 
            margin: 15px 0; 
            font-family: monospace; 
            font-size: 13px;
            color: var(--highlight);
            word-break: break-all;
        }

        .input-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        input, select { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 10px; border-radius: 6px; }
        
        .iframe-wrap { width: 100%; height: 500px; background: #000; border-radius: 8px; border: 2px solid #30363d; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #code-reveal { display: none; background: #0d1117; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); margin-top: 20px; }
        pre { white-space: pre-wrap; color: #79c0ff; font-size: 13px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; }
        .btn-blue { background: var(--accent); color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-card">
        <h1>Wordly Dynamic Iframe Demo</h1>
        
        <div class="input-group">
            <div class="field">
                <label>Session ID</label>
                <input type="text" id="session-id" placeholder="ABCD-1234" maxlength="9">
            </div>
            <div class="field">
                <label>Language</label>
                <select id="lang-picker">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="zh">Chinese (APAC Trigger)</option>
                    <option value="ja">Japanese (APAC Trigger)</option>
                    <option value="ko">Korean (APAC Trigger)</option>
                </select>
            </div>
        </div>

        <div class="url-monitor">
            <strong>LIVE SIGNAL PATH:</strong> <span id="url-display">Enter Session ID to generate...</span>
        </div>

        <div class="iframe-wrap">
            <iframe id="display-frame" allow="microphone"></iframe>
        </div>

        <button class="btn-blue" onclick="toggleCode()">Click Here to See Implementation Code</button>
    </div>

    <div id="code-reveal">
        <h3>Implementation Logic</h3>
        <pre id="code-output"></pre>
    </div>
</div>

<script>
const APAC_LIST = ['zh', 'ja', 'ko'];
const sidInput = document.getElementById('session-id');
const langPicker = document.getElementById('lang-picker');
const frame = document.getElementById('display-frame');
const urlDisplay = document.getElementById('url-display');
const codeOutput = document.getElementById('code-output');

// 1. Session ID Masking
sidInput.addEventListener('input', (e) => {
    let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4, 8);
    e.target.value = val;
    update();
});

// 2. Main Logic
function update() {
    const sid = sidInput.value;
    const lang = langPicker.value;
    
    if (sid.length < 9) {
        urlDisplay.innerText = "Awaiting valid Session ID (ABCD-1234)...";
        return;
    }

    const isApac = APAC_LIST.includes(lang);
    
    // UI Visual Shift
    document.body.style.backgroundColor = isApac ? "#0d2a1d" : "#0b0e14";

    // IMPORTANT: Correct URL structure to avoid "Refused to Connect"
    const finalUrl = `https://wordly.ai/stream/${sid}?language=${lang}&finalOnly=${isApac}`;
    
    urlDisplay.innerText = finalUrl;
    frame.src = finalUrl;

    // Build the "Code for Demo" block
    codeOutput.innerText = `
// THE SWITCHER FUNCTION
function updateIframe(selectedLang) {
    const sessionID = "${sid}";
    const apacList = ['zh', 'ja', 'ko'];
    
    // Determine if we need 'Complete Sentences' (finalOnly)
    const needsFinalOnly = apacList.includes(selectedLang);
    
    // Construct the dynamic URL
    const newSrc = "https://wordly.ai/stream/" + sessionID + 
                   "?language=" + selectedLang + 
                   "&finalOnly=" + needsFinalOnly;
                   
    // Inject into the iframe
    document.getElementById('wordly-frame').src = newSrc;
}`;
}

function toggleCode() {
    const el = document.getElementById('code-reveal');
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    el.scrollIntoView({ behavior: 'smooth' });
}

langPicker.addEventListener('change', update);

// Try to fetch expanded list, but the fail-safe is already in the HTML
fetch('https://assets.wordly.ai/language-config/languages.json')
    .then(r => r.json())
    .then(data => {
        langPicker.innerHTML = '';
        data.forEach(l => {
            let o = document.createElement('option');
            o.value = l.code;
            o.innerText = l.name + (APAC_LIST.includes(l.code) ? ' (APAC Trigger)' : '');
            langPicker.appendChild(o);
        });
    }).catch(e => console.log("Using backup language list."));

</script>
</body>
</html>
